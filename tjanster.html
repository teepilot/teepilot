<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<link rel="icon" type="image/png" sizes="128x128" href="TeePilot-Logo.png">
<link rel="stylesheet" href="main.css">
<title>Tjänster - TeePilot</title>

<style>

* {
    color: white;
}
.page-header {
    text-align: center;
    padding: 100px 20px 60px;
}

.page-header h1 {
    font-size: 42px;
    letter-spacing: 4px;
    margin-bottom: 20px;
}

.page-header p {
    opacity: 0.7;
    letter-spacing: 2px;
}


.service-container {
    max-width: 800px;
    margin: 0 auto 120px;
    padding: 60px;
    border: 1px solid rgba(255,255,255,0.2);
}

.service-container h2 {
    margin-bottom: 30px;
    letter-spacing: 3px;
}

.form-group {
    margin-bottom: 25px;
}

label {
    display: block;
    margin-bottom: 10px;
    font-size: 14px;
    letter-spacing: 2px;
}

input, select {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-family: 'Cinzel', serif;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    background: white;
    color: black;
    border: none;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 2px;
    transition: 0.3s ease;
}

button:hover {
    background: #ddd;
}

.stop-btn {
    background: transparent;
    color: white;
    border: 1px solid white;
}

.stop-btn:hover {
    background: white;
    color: black;
}

.status-box {
    margin-top: 40px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 14px;
    opacity: 0.8;
}

/* FIXA MÖRK KALENDER */

.flatpickr-calendar {
    background: #111 !important;
    border: 1px solid rgba(255,255,255,0.3);
}

.flatpickr-months,
.flatpickr-weekdays,
.flatpickr-weekday,
.flatpickr-day,
.flatpickr-current-month,
.flatpickr-time input,
.flatpickr-time .flatpickr-am-pm {
    color: white !important;
}

.flatpickr-day.selected {
    background: white !important;
    color: black !important;
}

.flatpickr-day:hover {
    background: rgba(255,255,255,0.2);
}

.flatpickr-time input {
    background: #111 !important;
}

.flatpickr-input {
    background: transparent;
    color: white;
}

@media (max-width: 768px) {
    .navbar {
        padding: 20px;
    }

    .service-container {
        padding: 30px;
        margin: 0 20px 80px;
    }
}

</style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><img src="TeePilot-Logo.png" alt="TeePilot Logo"></div>
        <ul class="nav-links">
            <li><a href="index.html">Hem</a></li>
            <li><a href="tjanster.html">Tjänster</a></li>
            <li><a href="konto.html">Konto</a></li>
        </ul>
    </nav>
    
    <div class="page-header">
        <h1>Bevakning</h1>
        <p>Vasatorp Tournament Course</p>
    </div>
    
    <div class="service-container">
        <div class="input-group">
            <label>GOLF-ID (ÅÅMMDD-XXX)</label>
            <input type="text" id="golfIdInput" placeholder="ÅÅMMDD-XXX">
        </div>
    
        <div class="input-group">
            <label>LÖSENORD (MINGOLF)</label>
            <input type="password" id="golfPasswordInput" placeholder="Ditt lösenord...">
        </div>
    
        <div class="input-group">
            <label>VÄLJ DATUM</label>
            <input type="text" id="datePicker" placeholder="Klicka för att välja datum...">
        </div>
    
        <div style="display: flex; gap: 20px;">
            <div class="input-group" style="flex: 1;">
                <label>FRÅN TID</label>
                <select id="fromTime">
                    <option value="06">06:00</option>
                    <option value="07">07:00</option>
                    <option value="08">08:00</option>
                    <option value="09">09:00</option>
                    <option value="10">10:00</option>
                    <option value="11">11:00</option>
                </select>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>TILL TID</label>
                <select id="toTime">
                    <option value="14">14:00</option>
                    <option value="15">15:00</option>
                    <option value="16">16:00</option>
                    <option value="17">17:00</option>
                    <option value="18">18:00</option>
                    <option value="19">19:00</option>
                </select>
            </div>
        </div>
    
        <button class="btn-start" onclick="startWatch()">STARTA BEVAKNING</button>
        <button class="btn-stop" onclick="stopWatch()">STOPPA BEVAKNING</button>
    
        <p id="status">Ingen aktiv bevakning</p>
    </div>
    
    <script>
        flatpickr("#datePicker", {
            minDate: "today",
            dateFormat: "Y-m-d",
            disableMobile: true
        });
    
        async function startWatch() {
            const golfId = document.getElementById("golfIdInput").value;
            const password = document.getElementById("golfPasswordInput").value;
            const date = document.getElementById("datePicker").value;
            const from = document.getElementById("fromTime").value;
            const to = document.getElementById("toTime").value;
            const email = localStorage.getItem("userEmail"); // E-post hämtas fortfarande från inloggningen
            
            if (!golfId || !password || !date) {
                alert("Vänligen fyll i Golf-ID, lösenord och datum.");
                return;
            }
    
            document.getElementById("status").innerText = "Kontaktar servern...";
    
            try {
                const response = await fetch("https://teepilot-server.onrender.com/start", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        golfId,
                        password,
                        date,
                        from: parseInt(from),
                        to: parseInt(to),
                        email: email || "din-mail@exempel.se" // Fallback om ingen mail hittas
                    })
                });
    
                if (response.ok) {
                    document.getElementById("status").innerText = "Bevakning startad! Vi mailar när vi hittar en tid.";
                } else {
                    document.getElementById("status").innerText = "Kunde inte starta. Dubbelkolla Golf-ID och lösenord.";
                }
            } catch (err) {
                document.getElementById("status").innerText = "Serverfel. Kontrollera att din Render-server är igång.";
            }
        }
    
        async function stopWatch() {
            try {
                await fetch("https://teepilot-server.onrender.com/stop", { method: "POST" });
                document.getElementById("status").innerText = "Bevakning stoppad.";
            } catch (err) {}
        }
    
        async function updateStatus() {
            try {
                const res = await fetch("https://teepilot-server.onrender.com/status");
                const data = await res.json();
                document.getElementById("status").innerText = data.status;
            } catch (err) {}
        }
    
        window.onload = updateStatus;
        setInterval(updateStatus, 10000);
    </script>
    
    </body>
    </html>
