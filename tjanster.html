    margin-bottom: 40px;

    font-size: 24px;
}

.input-group {

}

input, select {
    width: 100%;
    padding: 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: white;
    font-family: 'Cinzel', serif;

    -webkit-appearance: none;

select option {
    background: #1a1a1a; 
    color: white;

}

.input-group {

}

select {
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");

    background-size: 15px;

    width: 100%;

}

    border: 1px solid white;
    margin-top: 15px;
}

    background: white;
    color: black;
}

    margin-top: 40px;
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 14px;

    letter-spacing: 1px;

.flatpickr-calendar {

        <li><a href="index.html">Hem</a></li>

<section class="hero">
    <div class="hero-content">
        <h1>Bevakning</h1>
        <p>Vasatorp</p>
    </div>
</section>

<section class="service-content">
    <div class="service-container">
        <h2>Starta Ny Bevakning</h2>
        
        <div class="input-group">
            <label>GOLF-ID (ÅÅMMDD-XXX)</label>
            <input type="text" id="golfIdInput" placeholder="ÅÅMMDD-XXX">
        </div>
    
        <div class="input-group">
            <label>LÖSENORD (MINGOLF)</label>
            <input type="password" id="golfPasswordInput" placeholder="Ditt lösenord...">
        </div>

        <div class="input-group">
            <label>VÄLJ BANA</label>
            <select id="courseSelect">
                <option value="0abbcc77-25a8-4167-83c7-bbf43d6e863c">Vasatorp - Tournament Course</option>
                <option value="59279f96-b573-4dcb-9d9b-8fa6c3bf644e">Vasatorp - Classic Course</option>
                <option value="aaa98917-7e69-4f2b-8eaf-0ed7956ebf00">Vasatorp - Park Course</option>
            </select>
        </div>
    
        <div class="input-group">
            <label>VÄLJ DATUM</label>
            <input type="text" id="datePicker" placeholder="Klicka för att välja datum...">
        </div>
    
        <div style="display: flex; gap: 20px;">
            <div class="input-group" style="flex: 1;">
                <label>FRÅN TID</label>
                <select id="fromTime" onchange="updateToTimeOptions()">
                    <option value="06">06:00</option>
                    <option value="07">07:00</option>
                    <option value="08">08:00</option>
                    <option value="09">09:00</option>
                    <option value="10">10:00</option>
                    <option value="11">11:00</option>
                    <option value="12">12:00</option>
                    <option value="13">13:00</option>
                    <option value="14">14:00</option>
                    <option value="15">15:00</option>
                    <option value="16">16:00</option>
                    <option value="17">17:00</option>
                    <option value="18">18:00</option>
                    <option value="19">19:00</option>
                </select>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>TILL TID</label>
                <select id="toTime">
                    </select>
            </div>
        </div>
    
        <button class="btn-start" onclick="startWatch()">STARTA BEVAKNING</button>
        <button class="btn-stop" onclick="stopWatch()">STOPPA BEVAKNING</button>
    
        <p id="status">Ingen aktiv bevakning</p>
    </div>
</section>

<footer>
    <div class="footer-links">
        <a href="about.html">Om TeePilot</a>
        <a href="tjanster.html">Tjänster</a>
        <a href="konto.html">Konto</a>

    </div>

</footer>

<script>
    function updateToTimeOptions() {
        const fromSelect = document.getElementById("fromTime");
        const toSelect = document.getElementById("toTime");
        const selectedFrom = parseInt(fromSelect.value);
        
        toSelect.innerHTML = "";
        
        for (let i = selectedFrom + 1; i <= 20; i++) {
            const hour = i < 10 ? "0" + i : i;
            const option = document.createElement("option");
            option.value = hour;
            option.text = hour + ":00";
            toSelect.appendChild(option);
        }
    }

    updateToTimeOptions();
</script>
<script>
    flatpickr("#datePicker", {
        minDate: "today",
        dateFormat: "Y-m-d",
        disableMobile: true
    });

    async function startWatch() {
    const golfId = document.getElementById("golfIdInput").value;
    const password = document.getElementById("golfPasswordInput").value;
    const date = document.getElementById("datePicker").value;
    const from = document.getElementById("fromTime").value;
    const to = document.getElementById("toTime").value;
    const courseId = document.getElementById("courseSelect").value; 
    const email = localStorage.getItem("userEmail");
    
    if (!golfId || !password || !date) {
        alert("Vänligen fyll i Golf-ID, lösenord och datum.");
        return;
    }

    document.getElementById("status").innerText = "Kontaktar servern...";

    try {
        const response = await fetch("https://teepilot-server.onrender.com/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                golfId, 
                password, 
                date,
                from: parseInt(from),
                to: parseInt(to),
                courseId: courseId, 
                email: email || "din-mail@exempel.se"
            })
        });

        if (response.ok) {
            document.getElementById("status").innerText = "Bevakning startad! Vi mailar när en 4-boll blir ledig.";
        } else {
            document.getElementById("status").innerText = "Kunde inte starta. Kontrollera dina uppgifter.";
        }
    } catch (err) {
        document.getElementById("status").innerText = "Serverfel. Kontrollera att Render-servern är vaken.";
    }
}

    async function stopWatch() {
        try {
            await fetch("https://teepilot-server.onrender.com/stop", { method: "POST" });
            document.getElementById("status").innerText = "Bevakning stoppad.";
        } catch (err) {}
    }

    async function updateStatus() {
        try {
            const res = await fetch("https://teepilot-server.onrender.com/status");
            const data = await res.json();
            document.getElementById("status").innerText = data.status;
        } catch (err) {}
    }

    window.onload = updateStatus;
    setInterval(updateStatus, 10000);
</script>

</body>
