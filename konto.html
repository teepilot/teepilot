<style>
.account-section {
    padding: 150px 50px 100px;
    color: white;
    text-align: center;
}

.account-box {
    max-width: 450px;
    margin: 0 auto;
    padding: 50px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
}

.account-box h2 {
    margin-bottom: 30px;
    font-size: 20px;
}

.account-box input {
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 14px;
    letter-spacing: 2px;
}

.account-box button {
    width: 100%;
    padding: 15px;
    background: white;
    color: #111;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

.switch-mode {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.7;
    cursor: pointer;
}

.profile p {
    margin-bottom: 15px;
    letter-spacing: 2px;
}

.profile {
    text-align: left;
}

.avatar-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #3d8a7c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 26px;
    color: white;
    letter-spacing: 3px;
}

.profile-info {
    margin-bottom: 25px;
}

.profile-info p {
    margin-bottom: 15px;
    font-size: 13px;
    opacity: 0.9;
    text-align: left;
}

#toast {
    position: fixed;
    top: 30px;
    right: 30px;
    min-width: 280px;
    padding: 18px 25px;
    background: rgba(30, 30, 30, 0.95);
    color: white;
    font-size: 13px;
    letter-spacing: 1px;
    border-left: 4px solid #3d8a7c;
    backdrop-filter: blur(10px);
    transform: translateX(120%);
    opacity: 0;
    transition: all 0.4s ease;
    z-index: 9999;
}

#toast.show {
    transform: translateX(0);
    opacity: 1;
}

#toast.success {
    border-left-color: #3d8a7c;
}

#toast.error {
    border-left-color: #c0392b;
}

#toast.info {
    border-left-color: #3498db;
}

#favoritesList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.fav-item {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 15px;
    border-radius: 8px;
    position: relative;
    transition: all 0.3s ease;
    text-align: center;
}

.fav-item:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: #3d8a7c;
    transform: translateY(-2px);
}

.fav-info h4 {
    font-size: 16px;
    margin: 0;
    color: #fff;
    font-weight: 600;
}

.fav-info .fav-course {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #3d8a7c;
    margin-top: 5px;
    display: block;
}

.fav-info .fav-date {
    font-size: 11px;
    opacity: 0.6;
    margin-top: 2px;
    display: block;
}

.delete-fav {
    position: absolute;
    top: 5px;
    right: 8px;
    color: rgba(255, 255, 255, 0.3);
    cursor: pointer;
    font-size: 18px;
    transition: 0.2s;
}

.delete-fav:hover {
    color: #ff4757;
}

/* Modal Styling */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(5px);
    z-index: 10000;
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1a1a1a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 30px;
    border-radius: 8px;
    text-align: center;
    max-width: 350px;
    width: 90%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.modal-content h3 {
    font-family: 'Cinzel', serif;
    color: #3d8a7c;
    margin-bottom: 15px;
}

.modal-content p {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 25px;
    color: #fff;
}

.modal-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.modal-buttons button {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    transition: 0.3s;
}

.btn-cancel {
    background: rgba(255, 255, 255, 0.1);
    color: white;
}

.btn-confirm {
    background: #ff4757;
    color: white;
}

.btn-confirm:hover { background: #ff6b81; }
.btn-cancel:hover { background: rgba(255, 255, 255, 0.2); }

</style>
<style>
  @media (max-width: 600px) {
      .account-section {
          padding: 120px 15px 60px;
      }
  
      .account-box {
          padding: 30px 20px;
          width: 100%;
      }
  
      .profile-info p {
          font-size: 11px;
          letter-spacing: 1px;
      }
  }
  </style>
</head>

<body>

    <div class="nav-container">

            <img src="TeePilot-Logo.png" alt="TeePilot">

                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>

            <a href="about.html" class="nav-icon-link" title="Om TeePilot">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>

                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>

</nav>

<section class="hero">
    <div class="hero-content">
        <h1>TeePilot</h1>
        <p>Mitt konto</p>
    </div>
</section>

<section class="account-section">

<div class="account-box" id="authBox">

    <h2 id="title">Logga in</h2>

    <input type="text" id="name" placeholder="NAMN" style="display:none;">
    <input type="tel" id="phone" placeholder="TELEFONNUMMER" style="display:none;">
    <input type="text" id="golfId" placeholder="GOLF-ID (Min Golf)" style="display:none;">

    <input type="email" id="email" placeholder="E-POST">
    <input type="password" id="password" placeholder="LÖSENORD">

    <p id="golfNote" style="font-size:12px;opacity:0.7;margin-bottom:15px;display:none;">
    Använd samma lösenord som ditt konto på Min Golf
    </p>

    <button onclick="submitForm()">LOGGA IN</button>

    <div class="switch-mode" onclick="toggleMode()">
        Har du inget konto? Skapa konto
    </div>
</div>

<div class="account-box profile" id="profileBox" style="display:none;">

    <div class="avatar-wrapper">
      <div class="avatar" id="profileInitials">TP</div>    
    </div>

    <div class="profile-info">
      <p id="profileName"></p>
      <p id="profileEmail"></p>
      <p id="profilePhone"></p>
      <p id="profileGolfId"></p>
    </div>

    <div id="favoritesSection" style="margin-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px;">
      <h3 style="font-size: 12px; letter-spacing: 3px; margin-bottom: 5px; color: #3d8a7c; text-align: center;">MINA SPARADE TIDER</h3>
      <div id="favoritesList">
          </div>
    </div>

    <button onclick="logout()" style="margin-top: 10px;">LOGGA UT</button>
</div>


</section>

<footer>
  <div class="footer-links">
      <a href="about.html">Om TeePilot</a>
      <a href="tjanster.html">Tjänster</a>
      <a href="konto.html">Konto</a>
      <a href="index.html#contact">Kontakt</a>
  </div>

  <p>© 2026 TeePilot. Alla rättigheter förbehållna.</p>
  <img src="TeePilot-Logo.png" style="height: 50px; margin-top: 20px;">
</footer>

<div id="toast"></div>
<div id="deleteModal" class="modal-overlay">
  <div class="modal-content">
      <h3>Ta bort tid?</h3>
      <p>Är du säker på att du vill ta bort den här sparade tiden?</p>
      <div class="modal-buttons">
          <button onclick="closeDeleteModal()" class="btn-cancel">AVBRYT</button>
          <button id="confirmDeleteBtn" class="btn-confirm">TA BORT</button>
      </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    collection,
    getDocs,
    deleteDoc
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgYD19geGqA0ahIiwarqEjQzQlgHsJTO4",
    authDomain: "teepilot-a68cb.firebaseapp.com",
    projectId: "teepilot-a68cb",
    appId: "1:77764695808:web:6ed1612c078b8e5b57c5e5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let isLogin = true;
  const authBox = document.getElementById("authBox");
  const profileBox = document.getElementById("profileBox");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const nameInput = document.getElementById("name");
  const phoneInput = document.getElementById("phone");
  const golfIdInput = document.getElementById("golfId");


  async function loadFavorites(uid) {
    const favoritesList = document.getElementById("favoritesList");
    if (!favoritesList) return;

    try {
        const favRef = collection(db, "users", uid, "favorites");
        const querySnapshot = await getDocs(favRef);
        
        if (querySnapshot.empty) {
            favoritesList.innerHTML = '<p style="font-size: 11px; opacity: 0.5; grid-column: 1/-1;">Inga sparade tider än.</p>';
            return;
        }

        let html = "";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            html += `
                <div class="fav-item" id="fav-${doc.id}">
                    <span class="delete-fav" onclick="removeFavorite('${uid}', '${doc.id}')">×</span>
                    <div class="fav-info">
                        <h4>${data.time}</h4>
                        <span class="fav-course">${data.course}</span>
                        <span class="fav-date">${data.date}</span>
                    </div>
                </div>
            `;
        });
        favoritesList.innerHTML = html;
    } catch (error) {
        console.error("Fel vid hämtning av favoriter:", error);
    }
}
  let favToDelete = null;

  window.removeFavorite = function(uid, favId) {
      favToDelete = { uid, favId };
      const modal = document.getElementById("deleteModal");
      modal.style.display = "flex";
  };

  window.closeDeleteModal = function() {
      document.getElementById("deleteModal").style.display = "none";
      favToDelete = null;
  };

  document.getElementById("confirmDeleteBtn").onclick = async function() {
      if (!favToDelete) return;
      
      try {
          const { uid, favId } = favToDelete;
          await deleteDoc(doc(db, "users", uid, "favorites", favId));
          
          const element = document.getElementById(`fav-${favId}`);
          if (element) element.remove();
          
          showToast("Tiden har raderats", "info");
          closeDeleteModal();
      } catch (error) {
          showToast("Kunde inte radera", "error");
          closeDeleteModal();
      }
  };

  window.onclick = function(event) {
      const modal = document.getElementById("deleteModal");
      if (event.target == modal) {
          closeDeleteModal();
      }
  };


  window.toggleMode = function() {
      isLogin = !isLogin;
      document.getElementById("title").innerText = isLogin ? "Logga in" : "Skapa konto";
      document.querySelector(".account-box button").innerText = isLogin ? "LOGGA IN" : "SKAPA KONTO";
      nameInput.style.display = isLogin ? "none" : "block";
      phoneInput.style.display = isLogin ? "none" : "block";
      golfIdInput.style.display = isLogin ? "none" : "block";
  };

  window.submitForm = async function() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) return showToast("Fyll i alla fält");

      try {
          if (isLogin) {
              await signInWithEmailAndPassword(auth, email, password);
          } else {
              const userCredential = await createUserWithEmailAndPassword(auth, email, password);
              await setDoc(doc(db, "users", userCredential.user.uid), {
                  name: nameInput.value,
                  phone: phoneInput.value,
                  email: email,
                  golfId: golfIdInput.value,
                  password: password
              });
              showToast("Konto skapat!");
          }
      } catch (error) {
          showToast("Fel e-post eller lösenord", "error");
      }
  };

  window.logout = async function() {
      await signOut(auth);
      location.reload();
  };

  onAuthStateChanged(auth, async (user) => {
      if (user) {
          const docRef = doc(db, "users", user.uid);
          const docSnap = await getDoc(docRef);
          if (docSnap.exists()) {
              showProfile(docSnap.data());
              loadFavorites(user.uid);
          }
      } else {
          authBox.style.display = "block";
          profileBox.style.display = "none";
      }
  });

  function showProfile(user) {
      authBox.style.display = "none";
      profileBox.style.display = "block";
      document.getElementById("profileName").innerText = "NAMN: " + user.name;
      document.getElementById("profileEmail").innerText = "E-POST: " + user.email;
      document.getElementById("profilePhone").innerText = "TELEFON: " + user.phone;
      document.getElementById("profileGolfId").innerText = "GOLF-ID: " + user.golfId;
      
      const initials = user.name.split(" ").map(n => n[0]).join("");
      document.getElementById("profileInitials").innerText = initials;
  }

  function showToast(message, type = "success") {
      const toast = document.getElementById("toast");
      toast.innerText = message;
      toast.className = `show ${type}`;
      setTimeout(() => toast.classList.remove("show"), 3000);
  }
</script>

</body>
