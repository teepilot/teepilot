<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="128x128" href="TeePilot-Logo.png">
<title>Konto - TeePilot</title>
<link rel="stylesheet" href="main.css">

<style>
.account-section {
    padding: 150px 50px 100px;
    color: white;
    text-align: center;
}

.account-box {
    max-width: 450px;
    margin: 0 auto;
    padding: 50px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
}

.account-box h2 {
    margin-bottom: 30px;
    font-size: 20px;
}

.account-box input {
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 14px;
    letter-spacing: 2px;
}

.account-box button {
    width: 100%;
    padding: 15px;
    background: white;
    color: #111;
    border: none;
    font-weight: 600;
    cursor: pointer;
}

.switch-mode {
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.7;
    cursor: pointer;
}

.profile p {
    margin-bottom: 15px;
    letter-spacing: 2px;
}

.profile {
    text-align: left;
}

.avatar-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
}

.avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #3d8a7c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 26px;
    color: white;
    letter-spacing: 3px;
}

.profile-info {
    margin-bottom: 25px;
}

.profile-info p {
    margin-bottom: 15px;
    font-size: 13px;
    opacity: 0.9;
    text-align: left;
}

#toast {
    position: fixed;
    top: 30px;
    right: 30px;
    min-width: 280px;
    padding: 18px 25px;
    background: rgba(30, 30, 30, 0.95);
    color: white;
    font-size: 13px;
    letter-spacing: 1px;
    border-left: 4px solid #3d8a7c;
    backdrop-filter: blur(10px);
    transform: translateX(120%);
    opacity: 0;
    transition: all 0.4s ease;
    z-index: 9999;
}

#toast.show {
    transform: translateX(0);
    opacity: 1;
}

#toast.success {
    border-left-color: #3d8a7c;
}

#toast.error {
    border-left-color: #c0392b;
}

#toast.info {
    border-left-color: #3498db;
}

</style>
<style>
  @media (max-width: 600px) {
      .account-section {
          padding: 120px 15px 60px;
      }
  
      .account-box {
          padding: 30px 20px;
          width: 100%;
      }
  
      .profile-info p {
          font-size: 11px;
          letter-spacing: 1px;
      }
  }
  </style>
</head>

<body>

<nav class="navbar">
    <div class="logo">
        <img src="TeePilot-Logo.png">
    </div>
    <ul class="nav-links">
        <li><a href="index.html">Hem</a></li>
        <li><a href="about.html">Om</a></li>
        <li><a href="tjanster.html">Tjänster</a></li>
        <li><a href="konto.html">Konto</a></li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>TeePilot</h1>
        <p>Mitt konto</p>
    </div>
</section>

<section class="account-section">

<div class="account-box" id="authBox">

    <h2 id="title">Logga in</h2>

    <input type="text" id="name" placeholder="NAMN" style="display:none;">
    <input type="tel" id="phone" placeholder="TELEFONNUMMER" style="display:none;">
    <input type="text" id="golfId" placeholder="GOLF-ID (Min Golf)" style="display:none;">

    <input type="email" id="email" placeholder="E-POST">
    <input type="password" id="password" placeholder="LÖSENORD">

    <p id="golfNote" style="font-size:12px;opacity:0.7;margin-bottom:15px;display:none;">
    Använd samma lösenord som ditt konto på Min Golf
    </p>

    <button onclick="submitForm()">LOGGA IN</button>

    <div class="switch-mode" onclick="toggleMode()">
        Har du inget konto? Skapa konto
    </div>
</div>

<div class="account-box profile" id="profileBox" style="display:none;">

    <div class="avatar-wrapper">
      <div class="avatar" id="profileInitials">TP</div>    
    </div>

    <div class="profile-info">
      <p id="profileName"></p>
      <p id="profileEmail"></p>
      <p id="profilePhone"></p>
      <p id="profileGolfId"></p>
    </div>

    <div class="bookings-section" style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
      <h3 style="font-size: 14px; letter-spacing: 2px; margin-bottom: 15px;">KOMMANDE BOKNINGAR</h3>
      <div id="bookingsList" style="font-size: 12px; opacity: 0.8;">
          Laddar bokningar...
      </div>
    </div>

    <button onclick="logout()">LOGGA UT</button>
</div>


</section>

<footer>
  <div class="footer-links">
      <a href="about.html">Om TeePilot</a>
      <a href="tjanster.html">Tjänster</a>
      <a href="konto.html">Konto</a>
      <a href="index.html#contact">Kontakt</a>
  </div>

  <p>© 2026 TeePilot. Alla rättigheter förbehållna.</p>
  <img src="TeePilot-Logo.png" style="height: 50px; margin-top: 20px;">
</footer>

<div id="toast"></div>

<script type="module">

    function showToast(message, type = "success") {

          const toast = document.getElementById("toast");

          toast.innerText = message;
          toast.className = "";
          toast.classList.add(type);
          toast.classList.add("show");

          setTimeout(() => {
            toast.classList.remove("show");
          }, 3000);
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    
    // FIREBASE info o api
    const firebaseConfig = {
      apiKey: "AIzaSyBgYD19geGqA0ahIiwarqEjQzQlgHsJTO4",
      authDomain: "teepilot-a68cb.firebaseapp.com",
      projectId: "teepilot-a68cb",
      appId: "1:77764695808:web:6ed1612c078b8e5b57c5e5"
    };
    
    // Laddar ba in Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    
   
    let isLogin = true;
    
    const nameInput = document.getElementById("name");
    const phoneInput = document.getElementById("phone");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const golfIdInput = document.getElementById("golfId");
    const golfNote = document.getElementById("golfNote");
    
    const authBox = document.getElementById("authBox");
    const profileBox = document.getElementById("profileBox");
    
    const profileName = document.getElementById("profileName");
    const profileEmail = document.getElementById("profileEmail");
    const profilePhone = document.getElementById("profilePhone");
    const profileGolfId = document.getElementById("profileGolfId");
    
    
    window.toggleMode = function() {

      isLogin = !isLogin;

      document.getElementById("title").innerText =
        isLogin ? "Logga in" : "Skapa konto";

      document.querySelector(".account-box button").innerText =
        isLogin ? "LOGGA IN" : "SKAPA KONTO";

      document.querySelector(".switch-mode").innerText =
        isLogin
          ? "Har du inget konto? Skapa konto"
          : "Har du redan konto? Logga in";

      nameInput.style.display = isLogin ? "none" : "block";
      phoneInput.style.display = isLogin ? "none" : "block";
      golfIdInput.style.display = isLogin ? "none" : "block";
      golfNote.style.display = isLogin ? "none" : "block";

      };
    
    
    window.submitForm = async function() {
    
      const email = emailInput.value.trim();
      const password = passwordInput.value;
    
      if (!email || !password) {
        showToast("Fyll i alla fält");
        return;
      }
    
      try {
    
        if (isLogin) {

              const userCredential =
                await signInWithEmailAndPassword(auth, email, password);

              // Hämtar ba användardata
              const docRef = doc(db, "users", userCredential.user.uid);
              const docSnap = await getDoc(docRef);

              if (docSnap.exists()) {
                showProfile(docSnap.data());
              }
          } else {
    
          
          if (!nameInput.value || !phoneInput.value) {
            showToast("Fyll i namn och telefonnummer");
            return;
          }
    
          const userCredential =
            await createUserWithEmailAndPassword(auth, email, password);
    
          // För o spara extra data i firebase
          await setDoc(doc(db, "users", userCredential.user.uid), {
            name: nameInput.value,
            phone: phoneInput.value,
            email: email,
            golfId: golfIdInput.value,
            password: passwordInput.value
          });
    
          showToast("Konto skapat!");
          toggleMode();
        }
    
      } catch (error) {
        showToast("Fel e-post eller lösenord");
      }
    };
    
    
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // 1. Hitta användarens dokument i Firestore
        const docRef = doc(db, "users", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const userData = docSnap.data();
          
          // 2. Skicka all data (inkl. golfId och lösenord) till showProfile
          showProfile(userData);
        } else {
          console.error("Hittade ingen profil i databasen.");
        }
      } else {
        // Inte inloggad? Visa inloggningsrutan
        authBox.style.display = "block";
        profileBox.style.display = "none";
      }
    });
    
    
function showProfile(user) {
      console.log("Försöker hämta tider för:", user.golfId);
      console.log("Lösenord finns i databas:", user.password ? "JA" : "NEJ");
      const authBox = document.getElementById("authBox");
      const profileBox = document.getElementById("profileBox");
      const profileName = document.getElementById("profileName");
      const profileInitials = document.getElementById("profileInitials");

      authBox.style.display = "none";
      profileBox.style.display = "block";

      profileName.innerText = "NAMN: " + user.name;
      document.getElementById("profileEmail").innerText = "E-POST: " + user.email;
      document.getElementById("profilePhone").innerText = "TELEFON: " + user.phone;
      document.getElementById("profileGolfId").innerText = "GOLF-ID: " + user.golfId;
      
      const initials = user.name.split(" ").map(n => n[0]).join("");
      profileInitials.innerText = initials;

  // HÄR SKER MAGIN: Anropar servern automatiskt med sparade uppgifter
  if (user.golfId && user.password) {
      fetchMyBookings(user.golfId, user.password);
  }
}

async function fetchMyBookings(golfId, password) {
    const listContainer = document.getElementById("bookingsList");
    listContainer.innerHTML = '<p style="opacity:0.5;">Laddar dina bokningar...</p>';
    
    try {
        const response = await fetch("https://teepilot-server.onrender.com/get-bookings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ golfId, password })
        });

        const bookings = await response.json();

        if (!bookings || bookings.length === 0) {
            listContainer.innerHTML = "Inga kommande bokningar.";
            return;
        }

        listContainer.innerHTML = bookings.map(b => `
            <div style="background: rgba(255,255,255,0.05); padding: 12px; margin-bottom: 10px; border-left: 3px solid #3d8a7c;">
                <p style="margin:0; font-weight:600;">${b.courseName}</p>
                <p style="margin:5px 0 0 0; font-size:12px; opacity:0.8;">
                    ${b.startTime.replace('T', ' ').substring(0, 16)}
                </p>
            </div>
        `).join('');
    } catch (err) {
        listContainer.innerHTML = "Kunde inte hämta bokningar automatiskt.";
    }
}
</script>
    

</body>
</html>
